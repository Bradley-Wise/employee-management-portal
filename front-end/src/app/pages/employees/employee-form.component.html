<h2>Add/Edit Employee</h2>
<form (ngSubmit)="saveEmployee()">
  <label>Name:</label>
  <input [(ngModel)]="name" name="name" required /><br />

  <label>Email:</label>
  <input [(ngModel)]="email" name="email" required /><br />

  <label>Department:</label>
  <input [(ngModel)]="department" name="department" required /><br />

  <button type="submit">Save</button>
</form>
